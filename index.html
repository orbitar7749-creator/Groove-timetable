<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#3a6b3a">
<title>Grove Planner 🌿</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Silkscreen&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #2b4a2b;
  --bg2:       #1e3820;
  --moss:      #3d6b38;
  --fern:      #4e8244;
  --leaf:      #6aaa5a;
  --highlight: #9dcf7c;
  --glow:      #c8e8a0;
  --bark:      #5a3a1a;
  --bark2:     #7a5230;
  --stone:     #b8c4a8;
  --stone2:    #d4dfc8;
  --pink1:     #e8a0b8;
  --pink2:     #f0c0d0;
  --bluebell:  #7890c8;
  --firefly:   #e8f870;
  --cream:     #f0ead8;
  --panel:     rgba(30,56,32,0.88);
  --panel2:    rgba(42,72,36,0.92);
  --border:    #5a8a50;
  --border2:   #8cc870;
  --text:      #d8f0c0;
  --text2:     #b8d898;
  --muted:     #7a9a6a;
  --gold:      #e8d070;
  --shadow:    rgba(10,25,10,0.6);
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  background-image: url('1000035213.jpg');
  background-size: cover;
  background-attachment: fixed;
  background-position: center;
  color:var(--text);
  font-family:'VT323',monospace;
  font-size:19px;
  min-height:100vh;
  overflow-x:hidden;
  cursor:default;
}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:var(--bg2);}
::-webkit-scrollbar-thumb{background:var(--moss);}

.app{
  position:relative;z-index:3;
  width: 100%; /* Fully Wide */
  max-width:1000px; /* Increased for wider calendars */
  margin:0 auto;
  padding:0 0 80px; /* Removed side padding for edge-to-edge feel */
}

.panel{
  background:var(--panel);
  border:2px solid var(--border);
  box-shadow:3px 3px 0 rgba(10,25,10,0.5),inset 0 1px 0 rgba(200,232,160,0.08);
  backdrop-filter:blur(1px);
  position:relative;
}

.header-zone{ padding:18px 16px 10px; text-align:center; margin: 12px 10px; }
.date-line { font-family: 'Press Start 2P', monospace; font-size: 22px; color: var(--gold); margin-bottom: 10px; }
.clock-digits{ font-family:'Press Start 2P',monospace; font-size:26px; color:var(--gold); }

/* Progress bar */
.progress-wrap{padding:10px 14px 14px;}
.prog-label{ display:flex;justify-content:space-between;align-items:center; font-size:14px;color:var(--text2);margin-bottom:6px;}
.prog-track{ height:14px;background:rgba(10,25,10,0.6); border:2px solid var(--border);position:relative;overflow:hidden;}
.prog-fill{ height:100%; background:linear-gradient(90deg,#3d8a30,#6aaa5a,#9dcf7c,#c8e8a0); transition:width 1s ease; }

.sec-title{
  font-family:'Press Start 2P',monospace;
  font-size:8px;letter-spacing:2px;
  color:var(--highlight);
  padding:20px 14px 10px;
  display:flex;align-items:center;gap:8px;
}
.sec-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent);}

/* Activity Rows */
.act-row{ display:flex; margin:4px 10px; }
.act-time{ width:80px; font-size:14px; background:rgba(10,25,10,0.5); border:2px solid var(--border); display:flex; flex-direction:column; align-items:center; justify-content:center;}
.act-body{ flex:1; background:rgba(42,72,36,0.7); border:2px solid var(--border); border-left:none; padding:10px; display:flex; align-items:center; gap:10px; cursor:pointer;}
.act-name{ flex:1; font-size:20px;}
.act-chk{ width:20px; height:20px; border:2px solid var(--border2); }

/* WIDE CALENDARS */
.week-grid{ display:grid; grid-template-columns:repeat(7, 1fr); gap:0; width:100%; }
.wday{ 
    border: 1px solid var(--border); min-height: 100px; background: var(--panel); 
    display: flex; flex-direction: column; align-items: center; padding: 5px;
}
.wday.today { background: rgba(200, 232, 160, 0.1); border: 1px solid var(--firefly); }

.month-grid{ display:grid; grid-template-columns:repeat(7, 1fr); width: 100%; }
.mcell{ border: 1px solid rgba(90,138,80,0.3); min-height: 70px; background: var(--panel); position: relative; padding: 4px; }

/* Modal & Overlay */
.overlay{ position:fixed;inset:0;background:rgba(0,0,0,0.8); z-index:100; display:none; align-items:center; justify-content:center; backdrop-filter:blur(4px); }
.overlay.open{display:flex;}
.modal{ background:var(--panel2); border:3px solid var(--border2); width:95%; max-width:400px; padding: 20px; }

.sel-item {
    background: rgba(10,25,10,0.6); border: 2px solid var(--border);
    padding: 10px; margin-bottom: 8px; cursor: pointer; display: flex; align-items: center; gap: 10px;
}
.sel-item:hover { border-color: var(--highlight); background: var(--moss); }

.pbtn { padding: 10px; font-family: 'Press Start 2P'; font-size: 8px; cursor: pointer; border: 2px solid; }
.pbtn-g { background: #3d6b38; border-color: var(--glow); color: white; }
.pbtn-r { background: #8a3030; border-color: #f0a0a0; color: white; }

/* Custom Selector specifically for picking/editing existing items */
#selectorList { max-height: 300px; overflow-y: auto; margin-bottom: 15px; }

</style>
</head>
<body>

<div class="toasts" id="toastArea"></div>

<div class="app">
  <div class="header-zone panel">
    <div class="date-line" id="dateLine">-- --- ----</div>
    <div class="clock-row">
      <div class="clock-digits" id="clockDigits">--:--:--</div>
      <div class="clock-ampm" id="clockAMPM">--</div>
    </div>
    <div class="progress-wrap">
      <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
    </div>
  </div>

  <div class="sec-title">🌿 DAILY ROUTINE</div>
  <div class="panel" style="border-left:none; border-right:none; padding:10px 0;">
    <div id="actList"></div>
    <button class="add-btn" onclick="openActModal()" style="margin: 10px auto; display: block; width: 95%;">＋ ADD NEW ROUTINE</button>
  </div>

  <div class="sec-title">🍂 THE WEEK</div>
  <div class="panel week-wrap" style="border-left:none; border-right:none;">
    <div class="week-nav" style="padding: 10px;">
        <button onclick="chWeek(-1)">◀</button>
        <span id="weekLbl">--</span>
        <button onclick="chWeek(1)">▶</button>
    </div>
    <div class="week-grid" id="weekGrid"></div>
  </div>

  <div class="sec-title">🌸 THE MONTH</div>
  <div class="panel" style="border-left:none; border-right:none; padding-bottom: 20px;">
    <div class="month-header" style="padding: 10px; display:flex; justify-content:space-between;">
        <button onclick="chMonth(-1)">◀</button>
        <span class="month-lbl" id="monthLbl">--</span>
        <button onclick="chMonth(1)">▶</button>
    </div>
    <div class="month-grid" id="monthGrid"></div>
  </div>
</div>

<div class="overlay" id="evSelectorModal">
    <div class="modal">
        <div class="modal-hd" style="color: var(--gold); font-family: 'Press Start 2P'; font-size: 9px; margin-bottom: 15px;">
            MANAGE EVENTS
        </div>
        <div id="selectorList"></div>
        <div style="display:flex; gap:10px;">
            <button class="pbtn pbtn-g" style="flex:1" id="addNewEvBtn">＋ NEW EVENT</button>
            <button class="pbtn pbtn-r" onclick="closeOverlay('evSelectorModal')">CLOSE</button>
        </div>
    </div>
</div>

<div class="overlay" id="actModal">
  <div class="modal">
    <div class="modal-hd"><span id="actModalTitle">ROUTINE</span></div>
    <div class="modal-bd">
        <div class="flabel">NAME</div>
        <input class="pinput" id="aName" />
        <div style="display:flex; gap:10px; margin-top:10px;">
            <div style="flex:1;"><div class="flabel">START</div><input class="pinput" id="aStart" type="time"/></div>
            <div style="flex:1;"><div class="flabel">END</div><input class="pinput" id="aEnd" type="time"/></div>
        </div>
        <div class="flabel" style="margin-top:10px;">EMOJI</div>
        <div class="emoji-grid" id="emojiGrid"></div>
    </div>
    <div class="modal-ft" style="margin-top:15px; display:flex; gap:10px;">
      <button class="pbtn pbtn-g" style="flex:2" onclick="saveAct()">SAVE</button>
      <button class="pbtn pbtn-r" id="delActBtn" style="flex:1" onclick="delAct()">DELETE</button>
    </div>
  </div>
</div>

<div class="overlay" id="evModal">
  <div class="modal">
    <div class="modal-hd"><span id="evModalTitle">EVENT DETAILS</span></div>
    <div class="modal-bd">
      <div class="flabel">EVENT NAME</div>
      <input class="pinput" id="evName" />
      <input type="hidden" id="evDate" />
      <div style="display:flex; gap:10px; margin-top:10px;">
        <div style="flex:1;"><div class="flabel">START</div><input class="pinput" id="evStart" type="time"/></div>
        <div style="flex:1;"><div class="flabel">END</div><input class="pinput" id="evEnd" type="time"/></div>
      </div>
      <div class="flabel" style="margin-top:10px;">COLOR</div>
      <div class="color-row" id="colorRow"></div>
    </div>
    <div class="modal-ft" style="margin-top:15px; display:flex; gap:10px;">
      <button class="pbtn pbtn-g" style="flex:2" onclick="saveEv()">SAVE</button>
      <button class="pbtn pbtn-r" id="delEvBtn" style="flex:1" onclick="delEv()">DELETE</button>
    </div>
  </div>
</div>

<script>
let activities=[], defaultActs=[], events={};
let editActIdx=-1, editEvKey=null, editEvIdx=-1;
let selEmoji='🌿', selColor='#6aaa5a';
let weekOff=0, monthOff=0;
let sched={};

const EMOJIS=['🌿','🌸','🌻','🍃','🦋','☀️','🌙','⭐','🏃','📚','🍵','🍎','💪','🎨','🎵','💤','🧘','✏️','🌈','🦉','🐝','🌺','🍄','🌲','🧸','⚡','🎯','🔮'];
const COLORS=['#6aaa5a','#7890c8','#e8a0b8','#e8d070','#ffb74d','#ef9a9a','#ce93d8','#80deea'];

function persist(){
  localStorage.setItem('gp_acts',JSON.stringify(activities));
  localStorage.setItem('gp_def',JSON.stringify(defaultActs));
  localStorage.setItem('gp_evs',JSON.stringify(events));
}

function restore(){
  try{
    activities=JSON.parse(localStorage.getItem('gp_acts')||'null')||starterActs();
    events=JSON.parse(localStorage.getItem('gp_evs')||'{}');
  }catch{activities=starterActs();events={};}
}

function starterActs(){
  return [{name:'Morning Study',start:'06:00',end:'08:00',emoji:'📚',done:false}];
}

function tick(){
  const n=new Date();
  document.getElementById('clockDigits').textContent= n.toLocaleTimeString('en-GB');
  document.getElementById('dateLine').textContent= n.toDateString().toUpperCase();
  const cur=n.getHours()*60+n.getMinutes();
  const pct=Math.min(100,Math.max(0,(cur-360)/(17*60)*100));
  document.getElementById('progFill').style.width=pct+'%';
}
setInterval(tick,1000);

function t2m(t){const[h,m]=t.split(':').map(Number);return h*60+m;}
function fmt12(t){if(!t)return''; const[h,m]=t.split(':').map(Number); const ap=h>=12?'pm':'am'; return`${(h%12)||12}:${String(m).padStart(2,'0')}${ap}`;}
function todayKey(){return new Date().toISOString().slice(0,10);}

function renderActs(){
  const list=document.getElementById('actList');
  list.innerHTML='';
  activities.forEach((a,i)=>{
    const row=document.createElement('div');
    row.className='act-row';
    row.innerHTML=`
      <div class="act-time">${fmt12(a.start)}</div>
      <div class="act-body" onclick="openEditAct(${i})">
        <span class="act-emoji">${a.emoji}</span>
        <span class="act-name">${a.name}</span>
        <span style="font-size:12px; color:var(--muted);">✎</span>
      </div>`;
    list.appendChild(row);
  });
}

function openActModal(){
  editActIdx=-1;
  document.getElementById('aName').value='';
  document.getElementById('delActBtn').style.display='none';
  buildEGrid();
  document.getElementById('actModal').classList.add('open');
}

function openEditAct(i){
  editActIdx=i; const a=activities[i];
  document.getElementById('aName').value=a.name;
  document.getElementById('aStart').value=a.start;
  document.getElementById('aEnd').value=a.end;
  selEmoji=a.emoji;
  document.getElementById('delActBtn').style.display='block';
  buildEGrid();
  document.getElementById('actModal').classList.add('open');
}

function buildEGrid(){
  const g=document.getElementById('emojiGrid'); g.innerHTML='';
  EMOJIS.forEach(e=>{
    const b=document.createElement('button');
    b.className='eo'+(e===selEmoji?' sel':''); b.textContent=e;
    b.onclick=()=>{selEmoji=e; buildEGrid();};
    g.appendChild(b);
  });
}

function saveAct(){
  const name=document.getElementById('aName').value;
  const start=document.getElementById('aStart').value;
  const end=document.getElementById('aEnd').value;
  if(!name || !start) return;
  const obj={name,start,end,emoji:selEmoji,done:false};
  if(editActIdx>=0) activities[editActIdx]=obj;
  else activities.push(obj);
  activities.sort((a,b)=>t2m(a.start)-t2m(b.start));
  persist(); renderActs(); closeOverlay('actModal');
}

function delAct(){
  if(editActIdx<0)return;
  activities.splice(editActIdx,1); persist(); renderActs(); closeOverlay('actModal');
}

/* EVENT MANAGEMENT */
function openEvModal(dateKey) {
    const list = document.getElementById('selectorList');
    const dayEvents = events[dateKey] || [];
    editEvKey = dateKey;
    list.innerHTML = '';

    dayEvents.forEach((ev, i) => {
        const item = document.createElement('div');
        item.className = 'sel-item';
        item.innerHTML = `<span style="color:${ev.color}">⬤</span> <span>${ev.name}</span> <span style="margin-left:auto; font-size:12px;">${ev.start}</span>`;
        item.onclick = () => setupEvForm(dateKey, i);
        list.appendChild(item);
    });

    if(dayEvents.length === 0) list.innerHTML = '<div style="text-align:center; padding:20px; color:var(--muted);">No events today</div>';
    
    document.getElementById('addNewEvBtn').onclick = () => setupEvForm(dateKey, -1);
    document.getElementById('evSelectorModal').classList.add('open');
}

function setupEvForm(dateKey, idx) {
    closeOverlay('evSelectorModal');
    editEvKey = dateKey;
    editEvIdx = idx;
    document.getElementById('evDate').value = dateKey;
    const ev = idx >= 0 ? events[dateKey][idx] : null;

    document.getElementById('evName').value = ev ? ev.name : '';
    document.getElementById('evStart').value = ev ? ev.start : '';
    document.getElementById('evEnd').value = ev ? ev.end : '';
    selColor = ev ? ev.color : '#6aaa5a';
    document.getElementById('delEvBtn').style.display = idx >= 0 ? 'block' : 'none';
    
    buildCRow();
    document.getElementById('evModal').classList.add('open');
}

function saveEv(){
    const name = document.getElementById('evName').value;
    const date = document.getElementById('evDate').value;
    if(!name || !date) return;
    if(!events[date]) events[date]=[];
    const obj = {name, start:document.getElementById('evStart').value, end:document.getElementById('evEnd').value, color:selColor};
    
    if(editEvIdx >= 0) events[date][editEvIdx] = obj;
    else events[date].push(obj);
    
    persist(); renderWeek(); renderMonth(); closeOverlay('evModal');
}

function delEv(){
    if(!editEvKey || editEvIdx < 0) return;
    events[editEvKey].splice(editEvIdx, 1);
    persist(); renderWeek(); renderMonth(); closeOverlay('evModal');
}

function buildCRow(){
  const r=document.getElementById('colorRow'); r.innerHTML='';
  COLORS.forEach(c=>{
    const b=document.createElement('div'); b.className='co'+(c===selColor?' sel':'');
    b.style.background=c; b.onclick=()=>{selColor=c; buildCRow();}; r.appendChild(b);
  });
}

/* CALENDAR RENDERING */
function renderWeek(){
  const now=new Date();
  const sow=new Date(now); sow.setDate(now.getDate()-now.getDay()+weekOff*7);
  document.getElementById('weekLbl').textContent= sow.toDateString().toUpperCase();
  const g=document.getElementById('weekGrid'); g.innerHTML='';
  for(let i=0;i<7;i++){
    const d=new Date(sow); d.setDate(d.getDate()+i);
    const key=d.toISOString().slice(0,10);
    const cell=document.createElement('div');
    cell.className='wday' + (key===todayKey() ? ' today':'');
    cell.innerHTML=`<div style="font-size:10px; color:var(--muted)">${d.toDateString().split(' ')[0]}</div><div>${d.getDate()}</div>`;
    const devs = events[key] || [];
    devs.forEach(e => cell.innerHTML += `<div style="width:5px; height:5px; background:${e.color}; margin-top:2px;"></div>`);
    cell.onclick=()=>openEvModal(key);
    g.appendChild(cell);
  }
}

function renderMonth(){
  const base=new Date(); base.setDate(1); base.setMonth(base.getMonth()+monthOff);
  const yr=base.getFullYear(), mo=base.getMonth();
  document.getElementById('monthLbl').textContent= base.toLocaleString('default', { month: 'long' }).toUpperCase() + " " + yr;
  const g=document.getElementById('monthGrid'); g.innerHTML='';
  const first=new Date(yr,mo,1).getDay();
  const days=new Date(yr,mo+1,0).getDate();
  for(let i=0;i<first;i++) g.appendChild(document.createElement('div'));
  for(let d=1;d<=days;d++){
    const dateStr=`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const c=document.createElement('div');
    c.className='mcell' + (dateStr===todayKey() ? ' today' : '');
    c.innerHTML=`<div class="mn">${d}</div>`;
    const devs = events[dateStr] || [];
    if(devs.length > 0) c.innerHTML += `<div style="display:flex; gap:2px; margin-top:5px;">${devs.map(e=>`<div style="width:4px; height:4px; background:${e.color}"></div>`).join('')}</div>`;
    c.onclick=()=>openEvModal(dateStr);
    g.appendChild(c);
  }
}

function chWeek(d){weekOff+=d; renderWeek();}
function chMonth(d){monthOff+=d; renderMonth();}
function closeOverlay(id){document.getElementById(id).classList.remove('open');}

restore();
renderActs();
renderWeek();
renderMonth();
tick();
</script>
</body>
</html>
